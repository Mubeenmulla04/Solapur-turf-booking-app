# Spring Application
spring.application.name=solapur-turf-backend
server.port=${SERVER_PORT:8080}

# Database Configuration (Overrides via Environment Variables on Render)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/turf_booking_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Pool Configuration
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:20}
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Jackson
spring.jackson.default-property-inclusion=non_null

# JWT Configuration
jwt.secret=${JWT_SECRET:SolapurTurfBookingApp2024SecureJwtSecretKey!@#RandomSalt9876}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Razorpay Configuration
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_1DP5mmOlF5G5ag}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}

# CORS Configuration
spring.web.cors.allowed-origins=${ALLOWED_ORIGINS:*}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Logging
logging.level.com.solapur.turf=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=WARN
logging.level.root=${LOG_LEVEL_SPRING:INFO}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Firebase Configuration
firebase.config.path=${FIREBASE_CONFIG_PATH:firebase-service-account.json}
