# Spring Application
spring.application.name=solapur-turf-backend
server.port=8080

# Database Configuration (Hardcoded for local, use Env in Prod)
spring.datasource.url=jdbc:postgresql://localhost:5432/turf_booking_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=SolapurTurfBookingApp2024SecureJwtSecretKey!@#RandomSalt9876
jwt.expiration=86400000

# Razorpay Configuration
razorpay.key.id=rzp_test_1DP5mmOlF5G5ag
razorpay.key.secret=

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:8080
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Logging
logging.level.com.solapur.turf=INFO
logging.level.org.springframework.security=WARN
logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
