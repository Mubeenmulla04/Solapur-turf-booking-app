name: solapur_turf_app
description: Solapur Turf Booking — Flutter Mobile Application
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5

  # Navigation
  go_router: ^14.6.3

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Functional Error Handling
  dartz: ^0.10.1

  # Secure Storage (JWT tokens)
  flutter_secure_storage: ^9.2.2

  # Payments
  razorpay_flutter: ^1.3.7

  # Local Storage
  shared_preferences: ^2.3.3

  # Image
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  flutter_dotenv: ^5.1.0


  # Network Status
  connectivity_plus: ^6.1.1

  # Date/Time
  intl: ^0.19.0

  # UI Utilities
  gap: ^3.0.1
  lottie: ^3.1.3
  shimmer: ^3.0.0

  # Icons
  cupertino_icons: ^1.0.8
  share_plus: ^12.0.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Firebase & Notifications
  firebase_core: ^3.10.1
  firebase_messaging: ^15.2.1
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

  # Code Generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  # custom_lint and riverpod_lint removed: incompatible with analyzer 7.6.0

dependency_overrides:
  analyzer_plugin: '>=0.13.0 <0.14.0'

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app-logo1.jpeg"
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/images/app-logo1.jpeg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/animations/
